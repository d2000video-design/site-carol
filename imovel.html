<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imóvel | Carolina H. Marcello</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f7f7f7;
      color:#111;
    }

    header{
      width:100%;
      padding:22px 8%;
      background:white;
      border-bottom:1px solid #eee;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      font-size:24px;
    }

    header a{
      text-decoration:none;
      color:#111;
      font-weight:600;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
      padding:50px 8%;
    }

    .galeria{
  margin-bottom:40px;
}

.slider{
  position:relative;
}

.foto-principal{
  width:100%;
  height:620px;
  overflow:hidden;
  border-radius:24px;
}

.foto-principal img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.miniaturas{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-top:14px;
  padding-bottom:8px;
  max-width:100%;
}

.miniaturas img{
  width:90px;
  height:65px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  flex:0 0 auto;
  opacity:0.75;
  transition:0.3s;
}

.miniaturas img:hover{
  opacity:1;
  transform:scale(1.03);
}

    .foto-principal img,
    .miniaturas img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:22px;
      display:block;
    }
    .slider{
  position:relative;
}

.seta{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:10;
}

.esquerda{
  left:20px;
}

.direita{
  right:20px;
}

   .foto-principal{
  height:520px;
  overflow:hidden;
  border-radius:22px;
}

    .miniaturas{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  align-content:start;
}

.miniaturas img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:16px;
  cursor:pointer;
  display:block;
}

    .conteudo{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:40px;
      align-items:start;
    }

    .info,
    .box-contato{
      background:white;
      border-radius:24px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }

    .info h2{
      font-size:42px;
      margin-bottom:10px;
    }

    .local{
      font-size:18px;
      color:#555;
      margin-bottom:25px;
    }

    .valor{
      font-size:34px;
      font-weight:bold;
      margin-bottom:30px;
    }

    .detalhes{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:15px;
      margin-bottom:30px;
    }

    .detalhe{
      background:#f5f5f5;
      padding:18px;
      border-radius:16px;
      font-weight:600;
    }

    .descricao{
      font-size:18px;
      line-height:1.8;
      color:#444;
    }

    .box-contato{
      position:sticky;
      top:30px;
    }

    .box-contato h3{
      font-size:26px;
      margin-bottom:15px;
    }

    .box-contato p{
      color:#555;
      line-height:1.6;
      margin-bottom:25px;
    }

    .btn{
      display:block;
      width:100%;
      text-align:center;
      background:black;
      color:white;
      padding:16px 24px;
      border-radius:14px;
      text-decoration:none;
      font-weight:600;
    }

    .whatsapp-float{
      position:fixed;
      width:70px;
      height:70px;
      bottom:30px;
      right:30px;
      z-index:9999;
    }

    .whatsapp-float img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    @media(max-width:768px){
      header{
        flex-direction:column;
        gap:10px;
        padding:18px 6%;
      }

      header h1{
        font-size:20px;
      }

      .container{
        padding:30px 6%;
      }

      .galeria{
        grid-template-columns:1fr;
      }

      .foto-principal{
        height:300px;
      }

      .miniaturas{
        grid-template-columns:repeat(2,1fr);
      }

       .miniaturas img{
    width:75px;
    height:55px;
  }
}

      .conteudo{
        grid-template-columns:1fr;
      }

      .info,
      .box-contato{
        padding:24px;
      }

      .info h2{
        font-size:30px;
      }

      .valor{
        font-size:26px;
      }

      .descricao{
        font-size:16px;
      }

      .whatsapp-float{
        width:52px;
        height:52px;
        right:14px;
        bottom:14px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Carolina H. Marcello</h1>
  <a href="index.html">← Voltar para Home</a>
</header>

<main class="container" id="pagina-imovel">
  <p>Carregando imóvel...</p>
</main>

<a class="whatsapp-float" href="https://wa.me/5551999954842" target="_blank">
  <img src="whatsapp-logo.png" alt="WhatsApp">
</a>

<script>
const api = "https://sheetdb.io/api/v1/xb82mxvpii81t";

const parametros = new URLSearchParams(window.location.search);
const codigo = parametros.get("id");

fetch(api)
.then(response => response.json())
.then(imoveis => {
  const imovel = imoveis.find(item => item.codigo === codigo);

  const pagina = document.getElementById("pagina-imovel");

  if(!imovel){
    pagina.innerHTML = "<h2>Imóvel não encontrado.</h2>";
    return;
  }

  const fotos = [
  imovel.foto_principal,
  imovel.foto2,
  imovel.foto3,
  imovel.foto4,
  imovel.foto5,
  imovel.foto6,
  imovel.foto7,
  imovel.foto8,
  imovel.foto9,
  imovel.foto10,
  imovel.foto11,
  imovel.foto12,
  imovel.foto13,
  imovel.foto14,
  imovel.foto15
].filter(foto => foto && foto.trim() !== "");

  const fotoPrincipal = fotos[0];

  const miniaturas = fotos.slice(1).map(foto => `
    <img src="${foto}" onclick="trocarFoto('${foto}')">
  `).join("");

  pagina.innerHTML = `
   

      <section class="galeria">

  <div class="slider">

    <button class="seta esquerda" onclick="fotoAnterior()">❮</button>

    <div class="foto-principal">
      <img id="foto-principal" src="${fotoPrincipal}" alt="${imovel.titulo}">
    </div>

    <button class="seta direita" onclick="proximaFoto()">❯</button>

  </div>

</section>
    </section>

    <section class="conteudo">
      <div class="info">
        <h2>${imovel.titulo}</h2>
       <div class="local">
  Código: ${imovel.codigo} • ${imovel.bairro} • ${imovel.cidade}
</div>
        <div class="valor">${imovel.valor}</div>

        <div class="detalhes">
          <div class="detalhe">${imovel.quartos || "-"} quartos</div>
          <div class="detalhe">${imovel.banheiros || "-"} banheiros</div>
          <div class="detalhe">${imovel.vagas || "-"} vagas</div>
          <div class="detalhe">${imovel.area_construida || imovel.area || "-"} área</div>
        </div>

        <p class="descricao">${imovel.descricao}</p>
      </div>

      <aside class="box-contato">
        <h3>Gostou deste imóvel?</h3>
        <p>Fale com Carolina H. Marcello e agende uma visita.</p>

        <a class="btn" href="${imovel.whatsapp || 'https://wa.me/5551999954842'}" target="_blank">
          Chamar no WhatsApp
        </a>
      </aside>
    </section>
  `;
})
.catch(error => {
  document.getElementById("pagina-imovel").innerHTML =
    "<h2>Erro ao carregar imóvel.</h2>";
});

function trocarFoto(foto){
  document.getElementById("foto-principal").src = foto;
}
  let indiceAtual = 0;

function atualizarFoto(){
  document.getElementById("foto-principal").src = fotos[indiceAtual];
}

function proximaFoto(){
  indiceAtual++;

  if(indiceAtual >= fotos.length){
    indiceAtual = 0;
  }

  atualizarFoto();
}

function fotoAnterior(){
  indiceAtual--;

  if(indiceAtual < 0){
    indiceAtual = fotos.length - 1;
  }

  atualizarFoto();
}
</script>

</body>
</html>
